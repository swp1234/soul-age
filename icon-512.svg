<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <circle cx="256" cy="235" r="145" fill="url(#glow)"/>
  <!-- Crystal ball base -->
  <ellipse cx="256" cy="375" rx="85" ry="20" fill="#2E1065" opacity="0.6"/>
  <!-- Crystal ball -->
  <circle cx="256" cy="235" r="112" fill="url(#ball)" stroke="#a78bfa" stroke-width="3" stroke-opacity="0.5"/>
  <!-- Inner glow -->
  <circle cx="230" cy="208" r="36" fill="#c4b5fd" opacity="0.2"/>
  <!-- Sparkles -->
  <circle cx="130" cy="100" r="7" fill="#fff" opacity="0.7"/>
  <circle cx="395" cy="120" r="6" fill="#fff" opacity="0.5"/>
  <circle cx="110" cy="390" r="5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="405" cy="375" r="7" fill="#a78bfa" opacity="0.4"/>
  <circle cx="256" cy="100" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="380" cy="260" r="3" fill="#c4b5fd" opacity="0.5"/>
  <!-- Stand -->
  <path d="M192 347 Q256 368 320 347 L310 375 Q256 390 202 375 Z" fill="#4c1d95" opacity="0.8"/>
</svg>
