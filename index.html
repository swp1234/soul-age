    <main id="main-content">
        <header>
            <h1 class="app-title" data-i18n="app.title">Soul Age Test</h1>
            <p class="app-subtitle" data-i18n="app.subtitle">How old is your soul?</p>
        </header>

        <div class="container">
            <!-- Start Screen -->
            <section id="startScreen" class="card" aria-label="Start">
                <div class="start-content">
                    <div class="soul-orb">
                        <div class="orb-inner">&#128302;</div>
                    </div>
                    <p class="start-desc" data-i18n="app.description">Answer 12 deep questions to discover your soul's true age. Are you a fresh new soul or an ancient transcendent being?</p>
                    <button class="btn btn-start" id="startBtn" data-i18n="app.start">Discover My Soul Age</button>
                </div>
            </section>

            <!-- Quiz Screen -->
            <section id="quizScreen" style="display:none;" aria-label="Quiz">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                    <span class="progress-text" id="progressText">1 / 12</span>
                </div>
                <div class="card question-card" id="questionCard">
                    <div class="scenario-emoji" id="scenarioEmoji">&#128302;</div>
                    <h2 class="question-text" id="questionText"></h2>
                    <div class="options" id="optionsContainer"></div>
                </div>
            </section>

            <!-- Result Screen -->
            <section id="resultScreen" style="display:none;" aria-label="Result">
                <div class="card result-card">
                    <div class="result-tier-badge" id="tierBadge"></div>
                    <div class="soul-age-display">
                        <div class="soul-age-number" id="soulAgeNumber">0</div>
                        <div class="soul-age-unit" data-i18n="result.years">years old</div>
                    </div>
                    <div class="soul-meter-container">
                        <div class="soul-meter" id="soulMeter">
                            <div class="soul-meter-fill" id="soulMeterFill"></div>
                            <div class="soul-meter-glow" id="soulMeterGlow"></div>
                        </div>
                    </div>
                    <h2 class="result-tier-name" id="tierName"></h2>
                    <p class="result-tier-desc" id="tierDesc"></p>

                    <div class="soul-timeline" id="soulTimeline">
                        <h3 data-i18n="result.timeline">Soul Age Timeline</h3>
                        <div class="timeline-track" id="timelineTrack"></div>
                    </div>

                    <div class="share-section">
                        <h3 data-i18n="share.title">Share Your Soul Age</h3>
                        <div class="share-buttons">
                            <button class="btn btn-share btn-twitter" id="shareTwitter" data-i18n="share.twitter">Share on X</button>
                            <button class="btn btn-share btn-copy" id="shareCopy" data-i18n="share.copyUrl">Copy Link</button>
                        </div>
                    </div>

                    <button class="btn btn-retake" id="retakeBtn" data-i18n="result.retake">Retake Test</button>
                </div>
            </section>
