<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <circle cx="96" cy="88" r="55" fill="url(#glow)"/>
  <!-- Crystal ball base -->
  <ellipse cx="96" cy="140" rx="32" ry="8" fill="#2E1065" opacity="0.6"/>
  <!-- Crystal ball -->
  <circle cx="96" cy="88" r="42" fill="url(#ball)" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Inner glow -->
  <circle cx="86" cy="78" r="14" fill="#c4b5fd" opacity="0.2"/>
  <!-- Sparkles -->
  <circle cx="50" cy="40" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="148" cy="48" r="2.5" fill="#fff" opacity="0.5"/>
  <circle cx="42" cy="145" r="2" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="152" cy="140" r="3" fill="#a78bfa" opacity="0.4"/>
  <!-- Stand -->
  <path d="M72 130 Q96 138 120 130 L116 140 Q96 146 76 140 Z" fill="#4c1d95" opacity="0.8"/>
</svg>
